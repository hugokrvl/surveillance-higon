name: Surveillance Higon — Scan quotidien

on:
  schedule:
    # 17h00 UTC = 18h00 Paris (heure d'hiver CET)
    # 16h00 UTC = 18h00 Paris (heure d'été CEST)
    # On fait tourner les deux pour couvrir les deux fuseaux :
    - cron: "0 16 * * 1-5"   # 18h CEST (été, mars–oct)
    - cron: "0 17 * * 1-5"   # 18h CET  (hiver, oct–mars)

  # Permet aussi de lancer manuellement depuis l'interface GitHub
  workflow_dispatch:

permissions:
  contents: write   # autorise le commit de signals.json

jobs:
  scan:
    name: Scan marche Higon
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installation des dependances
        run: pip install -r requirements.txt

      - name: Lancement du scan
        env:
          PYTHONIOENCODING: utf-8
        run: python surveillance.py --scan

      - name: Commit des signaux du jour
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.json alert_state.json
          if git diff --cached --quiet; then
            echo "Aucun changement de signaux."
          else
            git commit -m "Signaux Higon du jour (scan automatique)"
            git pull --rebase --autostash
            git push
          fi
